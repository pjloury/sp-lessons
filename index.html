<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Español — Learn Spanish</title>
  <style>
    :root {
      --red:#c0392b; --red-dark:#922b21; --gold:#e6a817; --gold-light:#f4d03f;
      --bg:#f7f7f5; --sidebar:#16213e; --card:#ffffff; --text:#1a1a2e;
      --muted:#6c757d; --border:#e2e2e0; --blue:#2471a3; --green:#1e8449;
      --purple:#7d3c98; --orange:#d35400; --teal:#0e6655;
      --shadow:0 2px 16px rgba(0,0,0,.10); --radius:14px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}

    /* SIDEBAR */
    #sidebar{width:270px;min-width:270px;background:var(--sidebar);color:#dde1f0;display:flex;flex-direction:column;overflow-y:auto;z-index:50}
    .sb-head{padding:22px 20px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
    .sb-head h1{font-size:21px;color:var(--gold-light);font-weight:700}
    .sb-head p{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px}
    .sb-prog{padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
    .sb-prog-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,.4);margin-bottom:7px}
    .prog-track{height:4px;background:rgba(255,255,255,.12);border-radius:2px}
    .prog-fill{height:4px;background:var(--gold);border-radius:2px;transition:width .5s}
    .sb-nav{padding:10px 0;flex:1}
    .sb-sec{padding:8px 20px 3px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.28)}
    .sb-item{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;border-left:3px solid transparent;transition:background .15s}
    .sb-item:hover{background:rgba(255,255,255,.05)}
    .sb-item.active{background:rgba(192,57,43,.25);border-left-color:#e74c3c}
    .sb-item.done .sb-chk{color:#27ae60}
    .sb-emoji{font-size:17px;min-width:22px}
    .sb-info{flex:1}
    .sb-title{font-size:13px;font-weight:500}
    .sb-sub{font-size:11px;color:rgba(255,255,255,.36);margin-top:1px}
    .sb-chk{font-size:13px;color:rgba(255,255,255,.2)}
    .sb-badge{font-size:10px;background:var(--gold);color:#333;border-radius:4px;padding:1px 5px;font-weight:700;margin-left:2px}

    /* MAIN */
    #main{flex:1;overflow-y:auto}

    /* HERO */
    .hero{padding:44px 52px 32px;color:#fff;position:relative;overflow:hidden}
    .hero::after{content:attr(data-emoji);position:absolute;right:44px;top:50%;transform:translateY(-50%);font-size:90px;opacity:.15;pointer-events:none}
    .hero-num{font-size:11px;text-transform:uppercase;letter-spacing:2px;opacity:.65;margin-bottom:7px}
    .hero h2{font-size:34px;font-weight:700}
    .hero-vi{font-size:18px;opacity:.75;margin-top:3px}
    .hero p{font-size:14px;opacity:.85;margin-top:12px;max-width:520px;line-height:1.6}

    /* CONTENT AREA */
    .ca{padding:32px 52px 60px;max-width:960px}

    /* SECTION HEADERS */
    .sh{display:flex;align-items:center;gap:12px;margin:38px 0 18px}
    .sh:first-child{margin-top:0}
    .sh-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
    .sh-title{font-size:20px;font-weight:700}
    .sh-sub{font-size:13px;color:var(--muted);margin-top:2px}
    .sh-action{margin-left:auto;display:flex;align-items:center;gap:6px;padding:7px 15px;border:none;border-radius:20px;font-size:13px;cursor:pointer;transition:opacity .2s;white-space:nowrap}
    .sh-action:hover{opacity:.82}
    .btn-blue{background:var(--blue);color:#fff}
    .btn-gold{background:var(--gold);color:#333}
    .btn-green{background:var(--green);color:#fff}
    .btn-red{background:var(--red);color:#fff}

    /* TONE STRIP */
    .tone-strip{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px}
    .tone-strip h4{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:12px}
    .tone-row{display:flex;gap:10px;flex-wrap:wrap}
    .tone-chip{display:flex;flex-direction:column;align-items:center;padding:8px 13px;border-radius:10px;cursor:pointer;transition:transform .15s}
    .tone-chip:hover{transform:scale(1.07)}
    .tc-mark{font-size:22px;font-weight:700}
    .tc-name{font-size:10px;margin-top:2px;font-weight:600}
    .tc-desc{font-size:10px;color:var(--muted)}
    .t0{color:#2c3e50;background:#eaecee} .t1{color:#76448a;background:#f4ecf7}
    .t2{color:#1a5276;background:#d6eaf8} .t3{color:#b03a2e;background:#fadbd8}
    .t4{color:#935116;background:#fef9e7} .t5{color:#1e8449;background:#d5f5e3}

    /* VOCAB CARDS */
    .vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:13px}
    .vcard{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 16px 14px;cursor:pointer;position:relative;transition:transform .15s,box-shadow .15s,border-color .15s;user-select:none}
    .vcard:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:#c0c0be}
    .vcard.speaking{border-color:var(--blue);background:#eaf4fc}
    .vcard-vi{font-size:19px;font-weight:600;color:var(--red);margin-bottom:3px}
    .vcard-pron{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:6px}
    .vcard-en{font-size:13px}
    .vcard-play{position:absolute;top:9px;right:9px;width:26px;height:26px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;opacity:0;transition:opacity .15s;pointer-events:none}
    .vcard:hover .vcard-play{opacity:1}

    /* DIPHTHONG CARDS */
    .diph-list{display:flex;flex-direction:column;gap:15px}
    .diph-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .diph-head{display:flex;align-items:flex-start;gap:16px;padding:18px 22px 14px;background:linear-gradient(90deg,#fff8f2,#fff);border-bottom:1px solid var(--border)}
    .diph-sound{font-size:38px;font-weight:700;color:var(--red);min-width:60px;cursor:pointer;transition:color .15s}
    .diph-sound:hover{color:var(--red-dark)}
    .diph-body{flex:1}
    .diph-title{font-size:15px;font-weight:700;margin-bottom:4px}
    .diph-desc{font-size:13px;color:var(--muted);line-height:1.55}
    .diph-tip{margin-top:7px;font-size:12px;color:var(--blue);background:#eaf4fc;border-radius:6px;padding:5px 10px;display:inline-block}
    .diph-examples{display:flex;flex-wrap:wrap;gap:11px;padding:16px 22px}
    .diph-ex{background:var(--bg);border-radius:10px;padding:10px 14px;cursor:pointer;transition:background .15s;display:flex;flex-direction:column;min-width:80px}
    .diph-ex:hover{background:#ebebeb}
    .diph-ex.speaking{background:#d6eaf8}
    .de-vi{font-size:19px;font-weight:600;color:var(--red)}
    .de-en{font-size:12px;color:var(--muted);margin-top:2px}
    .de-note{font-size:11px;color:var(--blue);margin-top:2px}

    /* DIALOGUE */
    .dlg-intro{background:#fffaed;border:1px solid var(--gold);border-radius:10px;padding:13px 18px;font-size:13px;color:#7d6500;margin-bottom:20px;line-height:1.55}
    .dlg-list{display:flex;flex-direction:column;gap:14px}
    .dlg-row{display:flex;gap:12px;align-items:flex-start}
    .dlg-row.spk-b{flex-direction:row-reverse}
    .dlg-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;color:#fff}
    .spk-a .dlg-avatar{background:var(--red)}
    .spk-b .dlg-avatar{background:var(--blue)}
    .dlg-bubble{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;max-width:500px;flex:1}
    .spk-a .dlg-bubble{border-top-left-radius:4px}
    .spk-b .dlg-bubble{border-top-right-radius:4px}
    .dlg-vi{font-size:15px;font-weight:500;line-height:1.5;display:flex;align-items:flex-start;gap:6px}
    .dlg-vi-text{flex:1}
    .dlg-play{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:0;flex-shrink:0;margin-top:1px;opacity:.7;transition:opacity .15s}
    .dlg-play:hover{opacity:1}
    .dlg-trans{margin-top:8px;padding-top:8px;border-top:1px dashed var(--border)}
    .dlg-en{font-size:13px;color:var(--muted);font-style:italic}
    .dlg-note{font-size:11px;color:var(--blue);margin-top:4px}
    .dlg-reveal{background:none;border:1px dashed var(--border);color:var(--muted);font-size:12px;border-radius:6px;padding:4px 10px;cursor:pointer;margin-top:9px;display:flex;align-items:center;gap:5px;transition:border-color .15s,color .15s}
    .dlg-reveal:hover{border-color:var(--gold);color:#7d6500}
    .hidden{display:none!important}

    /* NOTE BOX */
    .note-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;font-size:14px;line-height:1.75}

    /* COMPLETE */
    .complete-wrap{text-align:center;margin-top:44px}
    .complete-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .15s}
    .complete-btn:hover:not(.done){opacity:.88;transform:scale(1.02)}
    .complete-btn.done{background:#95a5a6;cursor:default}
    .next-link{display:inline-block;margin-top:14px;background:none;border:none;color:var(--blue);cursor:pointer;font-size:14px;text-decoration:underline}

    /* WELCOME */
    .welcome{padding:52px;max-width:720px}
    .welcome h2{font-size:38px;font-weight:800;color:var(--red)}
    .welcome .sub{font-size:20px;color:var(--muted);margin-top:4px;margin-bottom:32px}
    .feat-list{display:flex;flex-direction:column;gap:13px;margin-bottom:28px}
    .feat{display:flex;align-items:center;gap:15px;padding:14px 18px;background:var(--card);border:1px solid var(--border);border-radius:12px}
    .feat-icon{font-size:28px}
    .feat-text h4{font-size:14px;margin-bottom:2px}
    .feat-text p{font-size:13px;color:var(--muted)}
    .tip-box{background:#fff9e6;border:1px solid var(--gold);border-radius:10px;padding:12px 16px;font-size:13px;color:#7d6500;margin-bottom:24px}
    .start-btn{padding:14px 36px;background:var(--red);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:background .2s,transform .15s}
    .start-btn:hover{background:var(--red-dark);transform:scale(1.02)}

    /* TONE GUIDE */
    .tone-detail-row{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;display:flex;align-items:center;gap:18px;cursor:pointer;margin-bottom:13px;transition:box-shadow .15s}
    .tone-detail-row:hover{box-shadow:var(--shadow)}
    .tone-hear{margin-left:auto;padding:8px 18px;border:1.5px solid;border-radius:20px;background:none;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;transition:all .15s}
    .ma-box{background:#fffaed;border:1px solid var(--gold);border-radius:var(--radius);padding:20px 24px;margin-top:10px}
    .ma-chips{display:flex;flex-wrap:wrap;gap:11px;margin-top:12px}
    .ma-chip{display:flex;flex-direction:column;align-items:center;padding:10px 14px;border-radius:10px;cursor:pointer;transition:transform .15s}
    .ma-chip:hover{transform:scale(1.06)}
    .ma-vi{font-size:26px;font-weight:700}
    .ma-en{font-size:11px;margin-top:3px}

    /* ===== PHRASEBOOK ===== */
    .phrase-grid{display:flex;flex-direction:column;gap:10px}
    .phrase-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:flex-start;gap:14px;transition:box-shadow .15s}
    .phrase-card:hover{box-shadow:var(--shadow)}
    .phrase-vi-wrap{flex:1}
    .phrase-vi{font-size:20px;font-weight:600;color:var(--red);cursor:pointer;transition:color .15s;display:inline}
    .phrase-vi:hover{color:var(--red-dark)}
    .phrase-pron{font-size:12px;color:var(--muted);font-style:italic;margin-top:3px}
    .phrase-en{font-size:14px;margin-top:5px;font-weight:500}
    .phrase-note{font-size:12px;color:var(--blue);margin-top:4px}
    .phrase-personal{font-size:11px;color:var(--green);margin-top:3px;font-weight:600}
    .phrase-play-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:14px;color:var(--muted);transition:all .15s;flex-shrink:0;margin-top:2px}
    .phrase-play-btn:hover{border-color:var(--red);color:var(--red)}
    .mình-box{background:linear-gradient(135deg,#f3e5f5,#ede7f6);border:1.5px solid #9c27b0;border-radius:var(--radius);padding:20px 24px;margin-bottom:28px}
    .mình-box h3{font-size:16px;font-weight:700;color:#6a1b9a;margin-bottom:10px}
    .mình-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .mình-chip{background:white;border:1.5px solid #ce93d8;border-radius:10px;padding:10px 14px;flex:1;min-width:140px}
    .mình-chip .mc-word{font-size:20px;font-weight:700;color:#7b1fa2}
    .mình-chip .mc-eng{font-size:12px;color:var(--muted);margin-top:2px}
    .mình-chip .mc-when{font-size:12px;color:var(--blue);margin-top:3px}
    .mình-example{margin-top:14px;padding:12px 16px;background:white;border-radius:10px;font-size:13px;color:#4a148c}
    .mình-example strong{color:#7b1fa2}

    /* ===== DRILL ===== */
    .drill-wrap{padding:32px 52px 60px;max-width:820px}
    .drill-config{display:flex;flex-direction:column;gap:22px}
    .drill-config h3{font-size:18px;font-weight:700;margin-bottom:10px}
    .set-checks{display:flex;flex-wrap:wrap;gap:10px}
    .set-check{display:flex;align-items:center;gap:8px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;cursor:pointer;transition:border-color .15s,background .15s;user-select:none}
    .set-check:hover{border-color:var(--blue)}
    .set-check.checked{border-color:var(--blue);background:#eaf4fc}
    .set-check input{accent-color:var(--blue)}
    .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .mode-card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:all .15s}
    .mode-card:hover{border-color:var(--blue);background:#f0f8ff}
    .mode-card.selected{border-color:var(--blue);background:#eaf4fc}
    .mode-card .mc-icon{font-size:28px;margin-bottom:8px}
    .mode-card .mc-title{font-size:15px;font-weight:700;margin-bottom:4px}
    .mode-card .mc-desc{font-size:12px;color:var(--muted)}
    .drill-start-btn{padding:14px 36px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .2s;align-self:flex-start}
    .drill-start-btn:hover{opacity:.88}
    .drill-start-btn:disabled{background:#95a5a6;cursor:not-allowed}

    /* DRILL RUNTIME */
    .drill-header{display:flex;align-items:center;gap:14px;margin-bottom:28px;flex-wrap:wrap}
    .drill-mode-label{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
    .drill-score{font-size:20px;font-weight:700}
    .drill-score .s-ok{color:var(--green)}
    .drill-score .s-bad{color:var(--red)}
    .drill-prog{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;min-width:100px}
    .drill-prog-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .3s}
    .drill-prog-text{font-size:12px;color:var(--muted);white-space:nowrap}
    .drill-end-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--muted);cursor:pointer}
    .drill-end-btn:hover{border-color:var(--red);color:var(--red)}

    .drill-card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:36px 40px;text-align:center;transition:border-color .2s}
    .drill-card.correct{border-color:var(--green);background:#f0fff4}
    .drill-card.wrong{border-color:var(--red);background:#fff5f5}

    /* FLASHCARD */
    .fc-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:14px}
    .fc-phrase{font-size:26px;font-weight:700;line-height:1.4;margin-bottom:8px}
    .fc-hint{font-size:13px;color:var(--muted);margin-top:16px;cursor:pointer}
    .fc-vi{font-size:28px;font-weight:700;color:var(--red);margin-bottom:6px;cursor:pointer}
    .fc-pron{font-size:14px;color:var(--muted);font-style:italic;margin-bottom:16px}
    .fc-btns{display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap}
    .fc-knew{padding:12px 28px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s}
    .fc-knew:hover{opacity:.88}
    .fc-didnt{padding:12px 28px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s}
    .fc-didnt:hover{opacity:.88}
    .fc-flip{padding:10px 24px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
    .fc-flip:hover{opacity:.88}

    /* TYPE DRILL */
    .type-dir{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:14px;font-weight:600}
    .type-phrase{font-size:24px;font-weight:700;line-height:1.4;margin-bottom:20px}
    .type-input{width:100%;max-width:480px;padding:14px 18px;font-size:17px;border:2px solid var(--border);border-radius:12px;outline:none;transition:border-color .15s;font-family:inherit}
    .type-input:focus{border-color:var(--blue)}
    .type-input.correct{border-color:var(--green);background:#f0fff4}
    .type-input.wrong{border-color:var(--red);background:#fff5f5}
    .type-actions{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap}
    .btn-check{padding:11px 28px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s}
    .btn-check:hover{opacity:.88}
    .btn-skip{padding:11px 22px;background:none;border:2px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer;transition:border-color .15s;color:var(--muted)}
    .btn-skip:hover{border-color:var(--muted)}
    .btn-next{padding:11px 28px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s}
    .btn-next:hover{opacity:.88}
    .type-result{margin-top:16px;padding:14px 18px;border-radius:10px;font-size:14px;line-height:1.6}
    .type-result.ok{background:#f0fff4;border:1px solid var(--green);color:#155724}
    .type-result.partial{background:#fff8e1;border:1px solid var(--gold);color:#7d6500}
    .type-result.bad{background:#fff5f5;border:1px solid var(--red);color:#721c24}
    .type-result .correct-ans{font-size:18px;font-weight:700;margin-top:6px}
    .drill-hear{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:14px;color:var(--muted);cursor:pointer;margin-top:12px;transition:border-color .15s}
    .drill-hear:hover{border-color:var(--red);color:var(--red)}

    /* MULTIPLE CHOICE */
    .mc-question-label{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:14px;font-weight:600}
    .mc-question{font-size:24px;font-weight:700;line-height:1.4;margin-bottom:28px}
    .mc-options{display:flex;flex-direction:column;gap:10px;text-align:left;max-width:520px;margin:0 auto}
    .mc-opt{background:var(--bg);border:2px solid var(--border);border-radius:12px;padding:14px 18px;cursor:pointer;font-size:17px;transition:all .15s}
    .mc-opt:hover:not(.disabled){border-color:var(--blue);background:#f0f8ff}
    .mc-opt.correct{border-color:var(--green)!important;background:#f0fff4!important}
    .mc-opt.wrong{border-color:var(--red)!important;background:#fff5f5!important}
    .mc-opt.disabled{cursor:default}

    /* RESULTS */
    .drill-results{text-align:center;padding:40px 20px}
    .res-score{font-size:64px;font-weight:800;margin-bottom:8px}
    .res-score.great{color:var(--green)}
    .res-score.ok{color:var(--gold)}
    .res-score.low{color:var(--red)}
    .res-pct{font-size:20px;color:var(--muted);margin-bottom:32px}
    .res-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .res-btn{padding:12px 24px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}
    .res-btn:hover{opacity:.88}

    /* ===== DIPHTHONG WORKSHOP ===== */
    .dw-modes{display:flex;gap:8px;margin-bottom:24px}
    .dw-mode-btn{padding:8px 18px;border:2px solid var(--border);border-radius:20px;background:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
    .dw-mode-btn.active{background:var(--red);border-color:var(--red);color:#fff}
    .dw-grid{display:flex;flex-direction:column;gap:16px}
    .dw-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:box-shadow .15s}
    .dw-card:hover{box-shadow:var(--shadow)}
    .dw-head{display:flex;align-items:flex-start;gap:20px;padding:20px 24px 16px;background:linear-gradient(90deg,#fff5f5,#fff);border-bottom:1px solid var(--border)}
    .dw-letters{font-size:46px;font-weight:800;color:var(--red);cursor:pointer;min-width:88px;line-height:1;transition:transform .15s}
    .dw-letters:hover{transform:scale(1.06)}
    .dw-body{flex:1}
    .dw-title{font-size:14px;font-weight:700;margin-bottom:4px}
    .dw-desc{font-size:13px;color:var(--muted);line-height:1.6}
    .dw-tip{font-size:12px;color:var(--blue);background:#eaf4fc;border-radius:6px;padding:5px 10px;margin-top:8px;display:inline-block}
    .dw-hear{padding:8px 18px;background:var(--red);color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;margin-top:2px;transition:opacity .15s}
    .dw-hear:hover{opacity:.85}
    .dw-examples{display:flex;flex-wrap:wrap;gap:10px;padding:14px 24px}
    .dw-ex{background:var(--bg);border-radius:10px;padding:10px 14px;cursor:pointer;transition:background .15s;display:flex;flex-direction:column;min-width:80px}
    .dw-ex:hover{background:#e8e8e8} .dw-ex.speaking{background:#d6eaf8}
    .dw-ex-vi{font-size:19px;font-weight:600;color:var(--red)}
    .dw-ex-en{font-size:12px;color:var(--muted);margin-top:2px}
    /* Drill mode */
    .dw-drill-card{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:40px;text-align:center;max-width:640px;margin:0 auto}
    .dw-drill-num{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:16px}
    .dw-drill-letters{font-size:72px;font-weight:800;color:var(--red);margin-bottom:12px;cursor:pointer;transition:transform .15s;display:inline-block}
    .dw-drill-letters:hover{transform:scale(1.05)}
    .dw-drill-desc{font-size:14px;color:var(--muted);line-height:1.6;max-width:480px;margin:0 auto 6px}
    .dw-drill-tip{font-size:13px;color:var(--blue);background:#eaf4fc;border-radius:8px;padding:8px 14px;display:inline-block;margin:10px 0}
    .dw-drill-examples{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:20px}
    .dw-drill-nav{display:flex;align-items:center;gap:12px;justify-content:center;margin-top:28px;flex-wrap:wrap}
    .dw-nav-btn{padding:10px 24px;border:2px solid var(--border);border-radius:10px;background:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
    .dw-nav-btn:hover{border-color:var(--blue);color:var(--blue)}
    .dw-hear-big{padding:12px 32px;background:var(--red);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .15s}
    .dw-hear-big:hover{opacity:.88}

    /* ===== TONE IDENTIFICATION DRILL ===== */
    .tid-wrap{max-width:700px;padding:32px 52px 60px}
    .tid-prompt{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;font-weight:600}
    .tid-word{font-size:58px;font-weight:800;color:var(--text);margin-bottom:4px;cursor:pointer;transition:color .15s;line-height:1.1}
    .tid-word:hover{color:var(--red)}
    .tid-word-en{font-size:14px;color:var(--muted);margin-bottom:28px}
    .tid-opts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:520px;margin:0 auto}
    .tid-opt{padding:14px 8px;border:2px solid var(--border);border-radius:12px;cursor:pointer;text-align:center;transition:all .15s;user-select:none}
    .tid-opt:hover:not(.disabled){border-color:var(--blue);background:#f0f8ff}
    .tid-opt.correct{border-color:var(--green)!important;background:#f0fff4!important}
    .tid-opt.wrong{border-color:var(--red)!important;background:#fff5f5!important}
    .tid-opt.show-correct{border-color:var(--green)!important;background:#f0fff4!important;opacity:.7}
    .tid-opt.disabled{cursor:default}
    .tid-mark{font-size:24px;font-weight:800}
    .tid-name{font-size:12px;font-weight:700;margin-top:2px}
    .tid-desc{font-size:10px;color:var(--muted);margin-top:1px}
    .tid-result-msg{margin-top:20px;font-size:16px;font-weight:600}

    /* ===== TONE CLUSTERS ===== */
    .tc-section{margin-bottom:36px}
    .tc-header{display:flex;align-items:center;gap:14px;padding:14px 20px;border-radius:12px;margin-bottom:14px}
    .tc-big-mark{font-size:40px;font-weight:800;min-width:54px;text-align:center;line-height:1}
    .tc-info h3{font-size:17px;font-weight:700;margin-bottom:2px}
    .tc-info p{font-size:13px;opacity:.9}
    .tc-words{display:flex;flex-wrap:wrap;gap:10px}
    .tc-word{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;cursor:pointer;transition:all .15s;min-width:80px}
    .tc-word:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
    .tc-word.speaking{border-color:var(--blue);background:#eaf4fc}
    .tcw-vi{font-size:18px;font-weight:600;color:var(--red)}
    .tcw-en{font-size:11px;color:var(--muted);margin-top:2px}
    .tc-empty{font-size:13px;color:var(--muted);font-style:italic}

    /* ===== AI DIALOGUE GENERATOR ===== */
    .ai-textarea{width:100%;padding:14px 18px;font-size:15px;border:2px solid var(--border);border-radius:12px;outline:none;resize:vertical;font-family:inherit;transition:border-color .15s;min-height:90px;line-height:1.6}
    .ai-textarea:focus{border-color:var(--purple)}
    .ai-gen-btn{display:inline-flex;align-items:center;gap:8px;margin-top:20px;padding:13px 30px;background:linear-gradient(135deg,#6c3483,#9b59b6);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .15s}
    .ai-gen-btn:hover{opacity:.9;transform:scale(1.02)}
    .ai-gen-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .ai-opt-group{display:flex;flex-direction:column;gap:8px}
    .ai-opt-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
    .ai-seg{display:flex;gap:6px;flex-wrap:wrap}
    .ai-seg-btn{padding:7px 16px;border:2px solid var(--border);border-radius:20px;background:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
    .ai-seg-btn.active{border-color:var(--purple);background:#f3e5f5;color:#6a1b9a}
    .ai-seg-btn:hover:not(.active){border-color:#ce93d8}
    .ai-loading{text-align:center;padding:60px 20px;color:var(--muted)}
    .ai-spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .ai-tip-bar{background:linear-gradient(90deg,#f3e5f5,#e8eaf6);border:1px solid #ce93d8;border-radius:10px;padding:10px 16px;font-size:13px;color:#4a148c;margin-bottom:20px}
    /* Exchange layout */
    .ai-exchanges{display:flex;flex-direction:column;gap:16px}
    .ai-ex{display:flex;gap:12px;align-items:flex-start}
    .ai-ex.ai-ex-b{flex-direction:row-reverse}
    .ai-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;background:var(--red);flex-shrink:0}
    .ai-av-b{background:var(--blue)}
    .ai-bubble-wrap{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;max-width:580px;flex:1}
    .ai-ex-b .ai-bubble-wrap{border-top-right-radius:4px}
    .ai-ex:not(.ai-ex-b) .ai-bubble-wrap{border-top-left-radius:4px}
    /* Word chips */
    .ai-words-line{line-height:2.4;padding-bottom:4px}
    .ai-word{display:inline-flex;flex-direction:column;align-items:center;cursor:pointer;margin:1px 2px;padding:3px 7px 2px;border-radius:7px;border:1.5px solid transparent;transition:all .15s;vertical-align:middle;user-select:none}
    .ai-word:hover{background:#fff0f0;border-color:#e8a0a0}
    .ai-word.revealed{background:#fef3e2;border-color:var(--gold)}
    .aw-vi{font-size:16px;font-weight:600;color:var(--text);line-height:1.2}
    .ai-word.revealed .aw-vi{color:var(--red)}
    .aw-en{font-size:10px;color:var(--blue);font-weight:600;line-height:1.1;display:none;margin-top:1px;white-space:nowrap}
    .ai-word.revealed .aw-en{display:block}
    /* Exchange actions */
    .ai-ex-actions{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
    .ai-btn-hear{background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 11px;font-size:13px;cursor:pointer;transition:all .15s;color:var(--muted)}
    .ai-btn-hear:hover{border-color:var(--red);color:var(--red)}
    .ai-btn-reveal{background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 11px;font-size:12px;cursor:pointer;transition:all .15s;color:var(--muted)}
    .ai-btn-reveal:hover{border-color:var(--gold);color:#7d6500}
    .ai-btn-en{background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 11px;font-size:12px;cursor:pointer;color:var(--blue);transition:all .15s}
    .ai-btn-en:hover{border-color:var(--blue)}
    .ai-full-en{font-size:13px;color:var(--muted);font-style:italic;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);line-height:1.6}
    .ai-regen-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px;padding:14px 18px;background:var(--card);border:1px solid var(--border);border-radius:12px}
    .ai-dlg-title{font-size:18px;font-weight:800;flex:1}
    .ai-scene-note{font-size:13px;color:#7d6500;background:#fffaed;border:1px solid var(--gold);border-radius:8px;padding:10px 14px;margin-bottom:16px;line-height:1.55}

    /* AUDIO BAR */
    #audio-bar{position:fixed;bottom:20px;right:20px;background:#222;color:#fff;border-radius:28px;padding:9px 18px;font-size:13px;display:flex;align-items:center;gap:9px;box-shadow:0 4px 20px rgba(0,0,0,.28);opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;z-index:999}
    #audio-bar.show{opacity:1;transform:translateY(0);pointer-events:auto}
    .audio-dot{width:8px;height:8px;background:var(--gold);border-radius:50%;animation:pulse 1s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
    #audio-stop{background:none;border:none;color:#888;cursor:pointer;font-size:16px;padding:0 0 0 4px}

    /* HAMBURGER */
    .hamburger{display:none;position:fixed;top:12px;left:12px;z-index:100;background:var(--red);color:#fff;border:none;border-radius:8px;width:40px;height:40px;font-size:18px;cursor:pointer;align-items:center;justify-content:center}
    @media(max-width:768px){
      .hamburger{display:flex}
      #sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);transition:transform .3s}
      #sidebar.open{transform:translateX(0)}
      .hero{padding:52px 20px 24px}
      .ca,.drill-wrap{padding:24px 20px 60px}
      .vocab-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr))}
      .welcome{padding:52px 20px}
      .mode-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="sb-nav" id="sb-nav"></div>
</nav>

<main id="main">
  <div id="content"></div>
</main>

<div id="audio-bar">

</div>

<script>
// ====================================================================

const TONES = [
  {name:"Silent H",   desc:"Never said",    mark:"h",    ex:"hola",    cls:"t0",meaning:"hello"},

  "The letter H is ALWAYS silent in Spanish. hola = OH-lah, hablar = ah-BLAR. Never aspirate it.",
  "A strong tongue trill. The back of your tongue flutters rapidly against the roof of your mouth.",
  "Pronounced like 'ny' in 'canyon' or 'onion'. A single sound, not N+Y. mañana = mah-NYAH-nah.",
  "A strong H sound, like gently clearing your throat. rojo = ROH-hoh, gente = HEN-teh.",
  "B and V are identical in Spanish — both a soft B. vino = BEE-noh (NOT vee-noh!).",
  "QU always sounds like K. The U is silent. qué = KEH, quiero = kee-EH-roh. Never 'kw'.",

// ====================================================================
// LESSON DATA
// ====================================================================
const LESSONS = [
  {id:1,emoji:"👋",title:"Greetings & Introductions",vi_title:"Saludos y presentaciones",
   color1:"#c0392b",color2:"#922b21",
   desc:"Begin your Spanish journey with essential greetings. Key note: Spanish has two ways to say 'you' — informal tú (friends/peers) and formal usted (strangers/elders). When in doubt, use usted.",
   vocab:[
     {vi:"hola",en:"hello / hi",pron:"OH-lah"},
     {vi:"adiós",en:"goodbye",pron:"ah-dee-OHS"},
     {vi:"gracias",en:"thank you",pron:"GRAH-see-ahs"},
     {vi:"por favor",en:"please",pron:"por fah-BOR"},

     {vi:"bien",en:"good / well",pron:"bee-EHN"},
     {vi:"¿y tú?",en:"and you?",pron:"ee TOO"},
   ],
   diphs:[
     {sound:"ll / y",title:"LL and Y — the 'yod' sound",
      desc:"In most Spanish, 'll' and 'y' both sound like English 'y' in 'yes'. So 'me llamo' = 'meh YAH-moh'. In Argentina/Uruguay they sound like 'sh' (called yeísmo).",

      examples:[{vi:"llamo",en:"I call / my name"},{vi:"yo",en:"I"},{vi:"ella",en:"she"},{vi:"lluvia",en:"rain"},{vi:"ya",en:"already / now"}]},

      tip:"Read the accent mark as a stress marker: está = ehs-TAH, mamá = mah-MAH, inglés = een-GLEHS.",
      examples:[{vi:"adiós",en:"goodbye"},{vi:"café",en:"coffee"},{vi:"está",en:"is"},{vi:"también",en:"also"},{vi:"inglés",en:"English"}]},
   ],
   dialogue:{title:"First Meeting",scene:"Two people meet at a language exchange event",exchanges:[
     {spk:"A",vi:"¡Hola! Me llamo Mara. ¿Cómo te llamas?",en:"Hi! My name is Mara. What's your name?",note:"te llamas = you call yourself (informal)"},

   explanation:"Spanish has two ways to say 'you': informal tú (friends, family, peers) and formal usted (strangers, elders, professionals). In much of Latin America, many also use 'vos' instead of tú. The verb changes with each: tú hablas vs. usted habla vs. vos hablás. When in doubt with someone new, use usted — it shows respect and makes a great first impression."
  },

  {id:2,emoji:"🔢",title:"Numbers & Time",vi_title:"Números y tiempo",
   color1:"#1a5276",color2:"#154360",
   desc:"Spanish numbers are logical — learn the base words and you can count to millions. We also learn to tell time: use 'es la una' for 1:00, but 'son las dos/tres…' for all others.",
   vocab:[

   ],
   dialogue:{title:"At the Market",scene:"Bargaining at a Latin American market",exchanges:[
     {spk:"A",vi:"¡Buenos días! ¿Cuánto cuesta esto?",en:"Good morning! How much does this cost?",note:"cuánto cuesta = how much does it cost"},
     {spk:"B",vi:"Buenos días. Cuesta veinte pesos.",en:"Good morning. It costs twenty pesos.",note:"pesos = currency in many Spanish-speaking countries"},
     {spk:"A",vi:"¿Tiene algo más barato?",en:"Do you have something cheaper?",note:"más barato = cheaper (más = more, barato = cheap)"},
     {spk:"B",vi:"Sí, tengo esto por quince pesos.",en:"Yes, I have this for fifteen pesos.",note:"quince = 15, por = for (price)"},
     {spk:"A",vi:"Perfecto. Son las diez de la mañana — ¿abre hasta tarde?",en:"Perfect. It's ten in the morning — are you open until late?",note:"de la mañana = in the morning (AM)"},

  {id:3,emoji:"🍽️",title:"Food & Drinks",vi_title:"Comida y bebidas",
   color1:"#d35400",color2:"#a84300",
   desc:"Essential food vocabulary for restaurants and markets. Key grammar: use 'me gustaría' (I would like) for polite ordering. And remember: ser vs. estar applies to food too! 'Es delicioso' (quality) vs. 'Está frío' (current state).",
   vocab:[
     {vi:"el café",en:"coffee",pron:"ehl kah-FEH"},{vi:"el agua",en:"water",pron:"ehl AH-gwah"},
     {vi:"la cerveza",en:"beer",pron:"lah sehr-BEH-sah"},{vi:"el vino",en:"wine",pron:"ehl BEE-noh"},
     {vi:"el pan",en:"bread",pron:"ehl pahn"},{vi:"el pollo",en:"chicken",pron:"ehl POH-yoh"},
     {vi:"el arroz",en:"rice",pron:"ehl ah-ROHS"},{vi:"los tacos",en:"tacos",pron:"lohs TAH-kohs"},
     {vi:"picante",en:"spicy",pron:"pee-KAHN-teh"},{vi:"delicioso",en:"delicious",pron:"deh-lee-see-OH-soh"},
     {vi:"la cuenta",en:"the bill",pron:"lah KWEHN-tah"},{vi:"¡salud!",en:"cheers!",pron:"sah-LOOD"},
     {vi:"me gustaría",en:"I would like",pron:"meh goos-tah-REE-ah"},{vi:"sin ___",en:"without ___",pron:"seen"},
   ],
   diphs:[
     {sound:"rr",title:"The Rolled RR",
      desc:"The double 'rr' is a strong trill — your tongue flutters rapidly against the roof of your mouth. Single 'r' in the middle of a word is a brief tap (like 'd' in 'butter'), but 'rr' and word-initial 'r' are always fully trilled.",
      tip:"To practice: say 'butter butter butter' fast — that middle 'd' flap IS the Spanish single R. For RR, add duration: hold the trill for a full beat.",
      examples:[{vi:"arroz",en:"rice"},{vi:"carro",en:"car"},{vi:"perro",en:"dog"},{vi:"rico",en:"delicious/rich"},{vi:"tierra",en:"land/earth"}]},
     {sound:"h (silent)",title:"The Silent H",
      desc:"In Spanish, the letter H is ALWAYS silent. 'Hola' is pronounced 'OH-lah' — the H makes no sound at all. This trips up English speakers who automatically aspirate H.",
      tip:"Whenever you see an H in Spanish, it's invisible. Pretend it doesn't exist: hoy = oy, hablar = ah-BLAR, hotel = oh-TEHL.",
      examples:[{vi:"hola",en:"hello"},{vi:"hablar",en:"to speak"},{vi:"hermana",en:"sister"},{vi:"hotel",en:"hotel"},{vi:"hay",en:"there is/are"}]},
   ],
   dialogue:{title:"At the Restaurant",scene:"Ordering at a Spanish-speaking restaurant",exchanges:[
     {spk:"A",vi:"Buenas tardes. ¿Qué desea?",en:"Good afternoon. What would you like?",note:"desea = you desire/would like (formal usted)"},
     {spk:"B",vi:"Me gustaría el pollo con arroz, por favor.",en:"I would like the chicken with rice, please.",note:"me gustaría = I would like (polite conditional)"},
     {spk:"A",vi:"¿Algo para beber?",en:"Something to drink?",note:"para beber = to drink"},
     {spk:"B",vi:"Un agua, por favor. ¿Está picante el pollo?",en:"A water please. Is the chicken spicy?",note:"está = is (temporary state, use estar)"},
     {spk:"A",vi:"No, no está picante. ¡Es muy delicioso!",en:"No, it's not spicy. It's very delicious!",note:"es = is (permanent quality, use ser)"},
   ]},
   explanation:"The ser/estar distinction applies beautifully to food. Use 'ser' for inherent qualities: 'El vino es rico' (The wine IS good — it's a good wine by nature). Use 'estar' for current states: 'El vino está frío' (The wine IS cold — right now, as a temporary condition). This same rule applies everywhere in Spanish: 'ser' for identity, 'estar' for state."
  },

  {id:4,emoji:"👨‍👩‍👧",title:"Family & Relationships",vi_title:"Familia y relaciones",
   color1:"#7d3c98",color2:"#6c3483",
   desc:"Family vocabulary plus a key grammar concept: noun gender. Most nouns ending in -o are masculine (el hermano), most ending in -a are feminine (la hermana). Adjectives must agree!",
   vocab:[
     {vi:"la madre",en:"mother",pron:"lah MAH-dreh"},{vi:"el padre",en:"father",pron:"ehl PAH-dreh"},
     {vi:"la hermana",en:"sister",pron:"lah ehr-MAH-nah"},{vi:"el hermano",en:"brother",pron:"ehl ehr-MAH-noh"},
     {vi:"la abuela",en:"grandmother",pron:"lah ah-BWEH-lah"},{vi:"el abuelo",en:"grandfather",pron:"ehl ah-BWEH-loh"},
     {vi:"la hija",en:"daughter",pron:"lah EE-hah"},{vi:"el hijo",en:"son",pron:"ehl EE-hoh"},
     {vi:"los padres",en:"parents",pron:"lohs PAH-drehs"},{vi:"casado/a",en:"married",pron:"kah-SAH-doh"},
     {vi:"soltero/a",en:"single",pron:"sohl-TEH-roh"},{vi:"mi familia",en:"my family",pron:"mee fah-MEE-lee-ah"},
   ],
   diphs:[
     {sound:"-o / -a endings",title:"Masculine & Feminine Nouns",
      desc:"Spanish nouns have grammatical gender. Most nouns ending in -o are masculine (use 'el'), most ending in -a are feminine (use 'la'). The article must match: el hermano, la hermana. Adjectives agree too: alto/alta.",
      tip:"El + masculine, La + feminine. hermano/hermana, abuelo/abuela, hijo/hija — the pattern is very consistent for family terms.",
      examples:[{vi:"el hermano / la hermana",en:"brother / sister"},{vi:"el abuelo / la abuela",en:"grandfather / grandmother"},{vi:"el hijo / la hija",en:"son / daughter"},{vi:"el amigo / la amiga",en:"friend (m/f)"}]},
     {sound:"h (silent)",title:"H Is Always Silent",
      desc:"Don't forget — H in Spanish makes NO sound. 'Hija' is pronounced 'EE-hah', 'hermana' is 'ehr-MAH-nah'. The H is completely invisible to your ears.",
      tip:"Cover the H with your finger when you read: ija, ermana, ola, ablar. That's exactly how they sound.",
      examples:[{vi:"hija",en:"daughter"},{vi:"hermana",en:"sister"},{vi:"hijo",en:"son"},{vi:"hablar",en:"to speak"},{vi:"hay",en:"there is"}]},
   ],
   dialogue:{title:"Talking About Family",scene:"A conversation over coffee about family",exchanges:[
     {spk:"A",vi:"¿Tienes hermanos?",en:"Do you have siblings?",note:"tienes = you have (informal tú)"},
     {spk:"B",vi:"Sí, tengo una hermana mayor y un hermano menor.",en:"Yes, I have an older sister and a younger brother.",note:"mayor = older, menor = younger"},
     {spk:"A",vi:"¿Y tus padres? ¿Dónde viven?",en:"And your parents? Where do they live?",note:"viven = they live"},
     {spk:"B",vi:"Mis padres viven en México. Soy de Guadalajara.",en:"My parents live in Mexico. I'm from Guadalajara.",note:"soy de = I am from (ser for origin)"},
     {spk:"A",vi:"¡Qué bonito! Mi familia es de España.",en:"How lovely! My family is from Spain.",note:"qué bonito = how lovely / beautiful"},
   ]},
   explanation:"Noun gender in Spanish is grammatical, not always biological. Most -o words are masculine, most -a words are feminine — but there are important exceptions! 'El problema' (problem) is masculine despite ending in -a. 'La mano' (hand) is feminine despite ending in -o. 'El agua' (water) is feminine but uses 'el' in singular. And adjectives must agree: 'el hermano alto' but 'la hermana alta'. This agreement extends through the whole sentence."
  },

   diphs:[
     {sound:"j / g(e,i)",title:"Jota — the Strong H",
      desc:"Spanish 'j' and 'g' before 'e' or 'i' make a strong raspy H sound — like a forceful clearing of your throat. This is NOT the English 'j' (like in 'judge'). 'Rojo' = ROH-hoh, 'gente' = HEN-teh.",

      desc:"The ñ is a distinct Spanish letter — NOT just 'n' with a decoration. It sounds like 'ny' as in 'canyon', 'onion', or 'new'. 'Pequeño' = peh-KEH-nyoh.",

   ],
   dialogue:{title:"Shopping for Clothes",scene:"In a clothing boutique",exchanges:[
     {spk:"A",vi:"Perdona, ¿tienen esta camisa en azul?",en:"Excuse me, do you have this shirt in blue?",note:"perdona = excuse me (informal)"},
     {spk:"B",vi:"Sí, la tenemos en azul y en verde también.",en:"Yes, we have it in blue and in green too.",note:"la = it (refers to camisa, feminine)"},
     {spk:"A",vi:"¿Cuánto cuesta la azul?",en:"How much does the blue one cost?",note:"la azul = the blue one (la = feminine article)"},
     {spk:"B",vi:"La camisa azul cuesta treinta euros. Es muy bonita.",en:"The blue shirt costs thirty euros. It's very pretty.",note:"bonita = pretty (feminine, agreeing with camisa)"},

   ]},
   explanation:"Adjective agreement in Spanish is a key grammar rule. Adjectives must match the noun in both gender (masculine/feminine) and number (singular/plural). The pattern: libro rojo → libros rojos; camisa roja → camisas rojas. Most adjectives change -o to -a for feminine and add -s for plural. Adjectives like 'azul' or 'verde' don't change for gender (they're already neutral) — just add -s for plural: libros azules, camisas verdes."
  },

   vocab:[
     {vi:"el aeropuerto",en:"airport",pron:"ehl ah-eh-roh-PWEHR-toh"},{vi:"la estación",en:"station",pron:"lah ehs-tah-see-OHN"},

   diphs:[

      desc:"In Latin America: 'c' before 'e'/'i', and 'z', are pronounced like 'S'. In Spain (Castilian): they're pronounced like English 'th' in 'think'. Both are correct — neither is 'wrong'.",

     {sound:"qu",title:"QU Always Sounds Like K",

   dialogue:{title:"Getting Around",scene:"Asking for directions in a Spanish-speaking city",exchanges:[

// ====================================================================
// TTS — uses Google Cloud when key present, Web Speech API as fallback
// ====================================================================
async function speak(text, lang, onEnd) {
  // Stop whatever is playing
  stopSpeech();
  if (!text) return;
  setAudioBar(text.length > 50 ? text.slice(0,50)+'…' : text, true);

  if (GOOGLE_TTS_KEY) {
    await speakGoogle(text, lang || 'es-US', onEnd);
  } else {
    speakWebFallback(text, lang || 'es-US', onEnd);
  }
}

async function speakGoogle(text, lang, onEnd) {
  const cacheKey = lang + ':' + text;
  try {
    let b64;
    if (ttsCache.has(cacheKey)) {
      b64 = ttsCache.get(cacheKey);
    } else {
      const voice = lang === 'es-US' ? ES_VOICE : EN_VOICE;
      const rate  = lang === 'es-US' ? 0.88 : 0.92;
      const res = await fetch(
        `https://texttospeech.googleapis.com/v1/text:synthesize?key=${GOOGLE_TTS_KEY}`,
        { method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            input: { text },
            voice: { languageCode: lang, name: voice },
            audioConfig: { audioEncoding:'MP3', speakingRate: rate, pitch: 0 }
          })
        }
      );
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      b64 = data.audioContent;
      ttsCache.set(cacheKey, b64);
    }
    const audio = new Audio('data:audio/mp3;base64,' + b64);
    currentAudio = audio;
    audio.onended = () => { currentAudio = null; setAudioBar('', false); if (onEnd) onEnd(); };
    audio.onerror = () => { currentAudio = null; setAudioBar('', false); };
    audio.play();
  } catch(err) {
    console.error('Google TTS error:', err);
    setAudioBar('Error: ' + err.message, true);
    setTimeout(() => setAudioBar('', false), 3000);
    // Fall back to web speech
    speakWebFallback(text, lang, onEnd);
  }
}

function speakWebFallback(text, lang, onEnd) {
  if (!window.speechSynthesis) { setAudioBar('', false); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang; u.rate = lang === 'en-US' ? 0.9 : 0.85; u.pitch = 1;
  if (lang !== 'en-US') {
    const v = speechSynthesis.getVoices().find(v => v.lang === 'es-US' || v.lang.startsWith('es'));
    if (v) u.voice = v;
  }
  u.onend  = () => { setAudioBar('', false); if (onEnd) onEnd(); };
  u.onerror = () => setAudioBar('', false);
  speechSynthesis.speak(u);
}

function speakVI(t, onEnd){ speak(t, 'es-US', onEnd) }
function speakEN(t, onEnd){ speak(t, 'en-US', onEnd) }
function stopSpeech(){
  if (currentAudio) { currentAudio.pause(); currentAudio.src=''; currentAudio=null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
  setAudioBar('', false);
}
function setAudioBar(t,show){
  document.getElementById('audio-label').textContent=t;
  document.getElementById('audio-bar').classList.toggle('show',show);
}
function playAllVocab(id){
  const l=LESSONS.find(x=>x.id===id); if(!l)return;
  let i=0;
  function next(){
    if(i>=l.vocab.length)return;
    const w=l.vocab[i++];
    speak(w.vi,'es-US',()=>speak(w.en,'en-US',()=>setTimeout(next,400)));
  }
  next();
}
function readExplanation(id){
  const l=LESSONS.find(x=>x.id===id); if(!l)return;
  const btn=document.getElementById('explain-btn');
  if(btn){btn.textContent='⏸ Playing…';btn.classList.add('btn-gold');btn.classList.remove('btn-blue')}

    if(btn){btn.textContent='🔊 Read aloud';btn.classList.add('btn-blue');btn.classList.remove('btn-gold')}
  });
}

// HELPERS
// ====================================================================
function esc(s){return s.replace(/"/g,'&quot;')}
function darken(h){
  const n=parseInt(h.replace('#',''),16);
  const r=Math.max(0,(n>>16)-30),g=Math.max(0,((n>>8)&0xff)-30),b=Math.max(0,(n&0xff)-30);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}
function shuffle(a){
  const r=[...a];
  for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}
  return r;
}
function stripTones(s){
  const m={'á':'a','à':'a','â':'a','ä':'a','é':'e','è':'e','ê':'e','ë':'e','í':'i','ì':'i','ï':'i','ó':'o','ò':'o','ô':'o','ö':'o','ú':'u','ù':'u','û':'u','ü':'u','ñ':'n','ç':'c','¿':'','¡':''};
  return s.toLowerCase().split('').map(c=>m[c]??c).join('').replace(/\s+/g,' ').trim();
}

function getSelectedPhrases(){
  return PHRASE_SETS.filter(s=>D.selectedSets.has(s.id)).flatMap(s=>s.phrases);
}

function startDrill(){
  const phrases=getSelectedPhrases();
  if(phrases.length===0)return;
  D.queue=shuffle(phrases);
  D.idx=0; D.score=0; D.wrong=[]; D.flipped=false; D.checked=false; D.result=null;
  renderDrillCard();
}

function renderDrillCard(){
  if(D.idx>=D.queue.length){showDrillResults();return}
  const p=D.queue[D.idx];
  const pct=Math.round((D.idx/D.queue.length)*100);
  const header=`
    <div class="drill-header">
      <span class="drill-mode-label">${{flashcard:'🃏 Flashcard','en-vi':'✍️ Type EN → ES','vi-en':'🔤 Type ES → EN',multiple:'🎯 Multiple Choice'}[D.mode]}</span>
      <span class="drill-score"><span class="s-ok">✓${D.score}</span> <span class="s-bad">✗${D.idx-D.score}</span></span>
      <div class="drill-prog"><div class="drill-prog-fill" style="width:${pct}%"></div></div>
      <span class="drill-prog-text">${D.idx+1} / ${D.queue.length}</span>
      <button class="drill-end-btn" data-action="end-drill">End</button>
    </div>`;
  let card='';
  if(D.mode==='flashcard') card=renderFlashcard(p);
  else if(D.mode==='en-vi') card=renderTypeCard(p,'en-vi');
  else if(D.mode==='vi-en') card=renderTypeCard(p,'vi-en');
  else card=renderMultipleChoice(p);
  currentPage='drills';
  document.getElementById('content').innerHTML=`<div class="drill-wrap">${header}${card}</div>`;
  document.getElementById('main').scrollTo(0,0);
  // Focus input if present
  const inp=document.getElementById('type-input');
  if(inp) setTimeout(()=>inp.focus(),100);
}

function renderFlashcard(p){
  if(!D.flipped){
    return `<div class="drill-card" id="drill-card">

      <div class="fc-phrase">${p.en}</div>
      <div class="fc-hint" data-action="flip-card">Click to flip →</div>

        <button class="fc-flip" data-action="flip-card">Flip Card</button>
        <button class="btn-skip" data-action="skip-card">Skip</button>

      <div class="fc-label" style="color:var(--muted)">Spanish:</div>
      <div class="fc-vi" data-action="speak-vi" data-text="${esc(p.vi)}">${p.vi}</div>
      <div class="fc-pron">/${p.pron}/</div>

function renderTypeCard(p,dir){
  const prompt=dir==='en-vi'?p.en:p.vi;
  const promptLabel=dir==='en-vi'?'Translate to Spanish:':'Translate to English:';
  const placeholder=dir==='en-vi'?'Type Spanish here…':'Type English here…';
  const result=D.checked&&D.result?renderTypeResult(p,dir):'';
  return `<div class="drill-card ${D.checked?(D.result==='wrong'?'wrong':'correct'):''}" id="drill-card">
    <div class="type-dir">${promptLabel}</div>
    <div class="type-phrase">${prompt}</div>
    <button class="drill-hear" data-action="speak-vi" data-text="${esc(p.vi)}">🔊 Hear Spanish</button>
    <br><br>
    <input type="text" id="type-input" class="type-input ${D.checked?(D.result==='wrong'?'wrong':'correct'):''}"
           placeholder="${placeholder}" ${D.checked?'disabled':''} autocomplete="off" autocorrect="off" spellcheck="false">
    ${result}
    <div class="type-actions">
      ${!D.checked
        ?`<button class="btn-check" data-action="check-answer" data-dir="${dir}">Check</button>
           <button class="btn-skip" data-action="skip-card">Skip</button>`
        :`<button class="btn-next" data-action="next-card">Next →</button>`}

}

function renderTypeResult(p,dir){
  const {result}=D;
  if(result==='perfect') return `<div class="type-result ok"><strong>✓ Perfect!</strong> Exact match with tone marks!</div>`;
  if(result==='close')   return `<div class="type-result partial"><strong>✓ Close enough!</strong> Correct meaning — keep practicing the tone marks!<div class="correct-ans">${dir==='en-vi'?p.vi:p.en}</div></div>`;
  return `<div class="type-result bad"><strong>✗ Not quite.</strong> The correct answer is:<div class="correct-ans">${dir==='en-vi'?p.vi:p.en}</div>${p.note?`<div style="font-size:12px;margin-top:6px;color:var(--blue)">📝 ${p.note}</div>`:''}</div>`;
}

function renderMultipleChoice(p){
  if(!D.choices||D.choices.length===0){
    // Generate 4 choices: correct + 3 random others
    const others=ALL_PHRASES.filter(x=>x.vi!==p.vi);
    const distractors=shuffle(others).slice(0,3).map(x=>x.vi);
    D.choices=shuffle([p.vi,...distractors]);
  }
  return `<div class="drill-card" id="drill-card">
    <div class="mc-question-label">Which Spanish phrase means:</div>
    <div class="mc-question">"${p.en}"</div>
    <button class="drill-hear" data-action="speak-vi" data-text="${esc(p.vi)}">🔊 Hear answer</button>
    <div class="mc-options">${D.choices.map(c=>`
      <div class="mc-opt ${D.checked?(c===p.vi?'correct':(c===D.userChoice?'wrong':'disabled')):'disabled'==(!D.checked?'disabled':'')}"
           data-action="${D.checked?'':'pick-choice'}" data-choice="${esc(c)}">${c}</div>`).join('')}
    </div>
    ${D.checked?`<div class="type-actions"><button class="btn-next" data-action="next-card">Next →</button></div>`:''}
  </div>`;
}

function showDrillResults(){

function checkAnswer(dir){
  const inp=document.getElementById('type-input');
  if(!inp)return;
  const p=D.queue[D.idx];
  const user=inp.value.trim();
  const correct=dir==='en-vi'?p.vi:p.en;
  if(user===correct){
    D.result='perfect'; D.score++;
  } else if(stripTones(user)===stripTones(correct)||(dir==='vi-en'&&correct.toLowerCase().includes(user.toLowerCase())&&user.length>2)){
    D.result='close'; D.score++;
  } else {
    D.result='wrong'; D.wrong.push(D.idx);
  }
  D.checked=true;
  if(D.result!=='wrong') speak(p.vi,'es-US');
  renderDrillCard();
}

function pickChoice(choice){
  if(D.checked)return;
  const p=D.queue[D.idx];
  D.userChoice=choice;
  if(choice===p.vi){D.score++; D.result='perfect'} else {D.wrong.push(D.idx); D.result='wrong'}
  D.checked=true;
  speak(p.vi,'es-US');
  renderDrillCard();
}

function nextCard(){
  D.idx++; D.flipped=false; D.checked=false; D.result=null; D.choices=[];
  renderDrillCard();
}

// EVENT DELEGATION
// ====================================================================
document.addEventListener('click',e=>{
  let el=e.target;
  while(el&&el!==document.body){
    const a=el.dataset.action;
    if(a){e.stopPropagation();handleAction(a,el.dataset,el);return}
    el=el.parentElement;
  }
});

// Enter key for type drills
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const inp=document.getElementById('type-input');
    if(inp&&document.activeElement===inp){
      if(!D.checked){
        const dirEl=document.querySelector('[data-action="check-answer"]');
        if(dirEl) checkAnswer(dirEl.dataset.dir);
      } else {
        nextCard();
      }
    }
  }
});

function handleAction(a,ds,el){
  switch(a){
    case 'speak-vi':
      speakVI(ds.text||'');
      el.classList.add('speaking'); setTimeout(()=>el.classList.remove('speaking'),900);
      break;
    case 'lesson':      showLesson(Number(ds.id)); break;
    case 'phrasebook':  showPhrasebook(ds.id); break;
    case 'drills':      showDrillConfig(); break;
    case 'tones':       showToneGuide(); break;
    case 'play-all':    playAllVocab(Number(ds.id)); break;
    case 'reveal':      toggleTrans(Number(ds.idx)); break;
    case 'reveal-all':  revealAll(); break;
    case 'explain':     readExplanation(Number(ds.id)); break;
    case 'complete':    markComplete(Number(ds.id)); break;
    case 'drill-set':
      D.selectedSets=new Set([ds.id]);
      showDrillConfig(); break;
    case 'toggle-set':
      if(D.selectedSets.has(ds.id)) D.selectedSets.delete(ds.id);
      else D.selectedSets.add(ds.id);
      el.closest('.set-check').classList.toggle('checked',D.selectedSets.has(ds.id));
      showDrillConfig(); break;
    case 'set-mode':
      D.mode=ds.id; showDrillConfig(); break;
    case 'start-drill':  startDrill(); break;
    case 'flip-card':    D.flipped=true; renderDrillCard(); break;
    case 'fc-knew':      D.score++; nextCard(); break;
    case 'fc-didnt':     D.wrong.push(D.idx); nextCard(); break;
    case 'skip-card':    D.wrong.push(D.idx); nextCard(); break;
    case 'check-answer': checkAnswer(ds.dir); break;
    case 'pick-choice':  pickChoice(ds.choice); break;
    case 'next-card':    nextCard(); break;
    case 'end-drill':    showDrillResults(); break;
    case 'redo-wrong':
      D.queue=D.wrong.map(i=>D.queue[i]);
      D.idx=0; D.score=0; D.wrong=[]; D.flipped=false; D.checked=false; D.result=null; D.choices=[];
      renderDrillCard(); break;
    case 'restart-drill': startDrill(); break;

    // Diphthong workshop
    case 'diphthongs': showDiphthongWorkshop(); break;
    case 'dw-mode':
      dwMode=ds.val; dwIdx=0; showDiphthongWorkshop(); break;
    case 'dw-prev':
      dwIdx=Math.max(0,dwIdx-1); renderDiphthongDrill(); break;
    case 'dw-next':
      dwIdx=Math.min(DW_DRILLABLE.length-1,dwIdx+1); renderDiphthongDrill(); break;

    // Tone identification
    case 'tone-id': showToneIdentDrill(false); break;
    case 'tone-id-restart': showToneIdentDrill(true); break;
    case 'pick-tone':
      if(TID.checked) break;
      TID.userTone=Number(ds.tone);
      if(TID.userTone===TID.pool[TID.idx].tone){ TID.score++; }
      else { TID.wrong.push(TID.idx); }
      TID.checked=true;
      speak(GD.pool[GD.idx].vi,'es-US');
      renderToneIdentCard(); break;
    case 'tone-id-next':
      TID.idx++; TID.checked=false; TID.userTone=null; renderToneIdentCard(); break;
    case 'tone-id-end': showToneIdentResults(); break;

    // Tone clusters
    case 'tone-clusters': showToneClusters(); break;

    // AI Dialogue Generator
    case 'ai-dialogue': showAIDialogue(); break;
    case 'ai-generate': doAIGenerate(); break;
    case 'ai-new': AI.result=null; AI.lastTopic=''; renderAIForm(); break;
    case 'ai-set-length':
      AI.length=ds.val;
      document.querySelectorAll('.ai-seg-btn').forEach(b=>b.classList.toggle('active',b.dataset.val===ds.val));
      break;
    case 'toggle-word':
      el.classList.toggle('revealed');
      break;
    case 'ai-play-line':
      speakVI(ds.text); break;
    case 'ai-reveal-line': {
      const exEl=document.getElementById(`ai-ex-${ds.idx}`);
      if(!exEl) break;
      const wds=exEl.querySelectorAll('.ai-word');
      const allOn=[...wds].every(w=>w.classList.contains('revealed'));
      wds.forEach(w=>w.classList.toggle('revealed',!allOn));
      el.textContent=allOn?'👁 Reveal all words':'🙈 Hide all words';
      break;
    }
    case 'ai-toggle-en': {
      const fen=document.getElementById(`ai-fen-${ds.idx}`);
      if(!fen) break;
      const hidden=fen.classList.toggle('hidden');
      el.textContent=hidden?'Show translation':'Hide translation';
      break;
    }
    case 'play-tone-cluster':
      const clusterWords=buildToneClusters()[Number(ds.tone)];
      let ci=0;
      function playNext(){ if(ci>=clusterWords.length) return; speak(clusterWords[ci++].vi,'es-US',()=>setTimeout(playNext,600)); }
      playNext(); break;
  }
}

// ====================================================================
// AI DIALOGUE GENERATOR
// ====================================================================
let AI = {
  loading: false,
  result: null,
  length: 'medium',
  lastTopic: '',
};

function showAIDialogue(){
  currentPage='ai-dialogue'; renderNav();
  renderAIForm();
}

function renderAIForm(){
  setContent(`
    <div class="hero" data-emoji="✨" style="background:linear-gradient(135deg,#1a1a4e,#5b2c8d)">
      <div class="hero-num">AI Feature</div>
      <h2>Dialogue Generator</h2>
      <div class="hero-vi">Generar diálogos con IA</div>
      <p>Describe any scene and AI writes a natural Spanish conversation. Click each word to reveal its English meaning.</p>
    </div>
    <div class="ca">
      ${AI.loading?`<div class="ai-loading"><div class="ai-spinner"></div><p style="font-size:16px;font-weight:600">Generating your dialogue…</p><p style="font-size:13px;color:var(--muted);margin-top:6px">Writing Spanish dialogue, adding word glosses…</p></div>`:''}
      <div id="ai-form-area" ${AI.loading?'style="display:none"':''}>
        <div class="sh" style="margin-top:0"><div class="sh-icon" style="background:#ede7f6;font-size:20px">✨</div><div><div class="sh-title">Topic or scene</div><div class="sh-sub">Be specific — the AI writes better when it has context</div></div></div>
        <textarea id="ai-topic" class="ai-textarea" placeholder="Examples:&#10;• Ordering tapas at a restaurant in Madrid&#10;• Mara introduces herself at a language exchange event&#10;• Two friends debate the best dish — tacos vs. empanadas&#10;• Asking for directions to the mercado&#10;• Chatting about travel plans over café con leche">${AI.lastTopic}</textarea>

        <div style="display:flex;gap:20px;flex-wrap:wrap;margin-top:22px">
          <div class="ai-opt-group">
            <div class="ai-opt-label">Dialogue length</div>
            <div class="ai-seg">
              ${['short','medium','long'].map(v=>`<button class="ai-seg-btn${AI.length===v?' active':''}" data-action="ai-set-length" data-val="${v}">${{short:'Short (4–6)',medium:'Medium (8–10)',long:'Long (12–14)'}[v]}</button>`).join('')}
            </div>
          </div>
          <div class="ai-opt-group" style="flex:1;min-width:220px">
            <div class="ai-opt-label">Include vocabulary from</div>
            <div class="set-checks" style="gap:7px">
              ${PHRASE_SETS.map(s=>`<label class="set-check checked" style="font-size:11px;padding:6px 10px"><input type="checkbox" checked data-ai-set="${s.id}"> ${s.emoji} ${s.title}</label>`).join('')}
            </div>
          </div>
        </div>

        <button class="ai-gen-btn" id="ai-gen-btn" data-action="ai-generate">✨ Generate Dialogue</button>
      </div>
      <div id="ai-output">${AI.result&&!AI.loading?renderAIResultHTML(AI.result):''}</div>
    </div>`);
}

function renderAIResultHTML(dlg){
  if(!dlg) return '';
  return `
    <div class="ai-regen-bar">
      <div class="ai-dlg-title">💬 ${dlg.title||'AI Dialogue'}</div>
      <button class="sh-action btn-gold" data-action="ai-generate" style="font-size:12px;padding:6px 14px">↺ Regenerate</button>
      <button class="sh-action" style="font-size:12px;padding:6px 14px;background:#eee;color:var(--text)" data-action="ai-new">✏️ New topic</button>
    </div>
    ${dlg.scene?`<div class="ai-scene-note">📍 ${dlg.scene}</div>`:''}
    <div class="ai-tip-bar">💡 <strong>Click any Spanish word</strong> to reveal its English meaning. Click again to hide. Use 🔊 to hear the line.</div>
    <div class="ai-exchanges">
      ${(dlg.exchanges||[]).map((ex,i)=>buildExchangeHTML(ex,i)).join('')}
    </div>`;
}

function buildExchangeHTML(ex,i){
  const isB=ex.speaker==='B';
  const words=(ex.words||[]).map((w,wi)=>`<span class="ai-word" data-action="toggle-word"><span class="aw-vi">${w.vi}</span><span class="aw-en">${w.en}</span></span>`).join(' ');
  return `
    <div class="ai-ex${isB?' ai-ex-b':''}" id="ai-ex-${i}">
      <div class="ai-avatar${isB?' ai-av-b':''}">${ex.speaker}</div>
      <div class="ai-bubble-wrap">
        <div class="ai-words-line">${words}</div>
        <div class="ai-ex-actions">
          <button class="ai-btn-hear" data-action="ai-play-line" data-text="${esc(ex.vi)}" title="Hear this line">🔊 Hear</button>
          <button class="ai-btn-reveal" data-action="ai-reveal-line" data-idx="${i}">👁 Reveal all words</button>
          <button class="ai-btn-en" data-action="ai-toggle-en" data-idx="${i}">Show translation</button>
        </div>
        <div class="ai-full-en hidden" id="ai-fen-${i}">${ex.en}</div>
      </div>
    </div>`;
}

async function doAIGenerate(){
  const topicEl=document.getElementById('ai-topic');
  const topic=(topicEl?.value||AI.lastTopic).trim();
  if(!topic){ alert('Please enter a topic or scene first!'); return; }
  AI.lastTopic=topic;

  // collect selected phrase sets for vocab hints
  const setIds=[...document.querySelectorAll('[data-ai-set]:checked')].map(el=>el.dataset.aiSet);
  const hints=PHRASE_SETS.filter(s=>setIds.includes(s.id))
    .flatMap(s=>s.phrases)
    .filter(p=>!p.vi.includes('___')&&!p.vi.includes('…'))
    .sort(()=>Math.random()-.5)
    .slice(0,22);

  const lenMap={short:'4 to 6',medium:'8 to 10',long:'12 to 14'};
  const vocabStr=hints.length?`\n\nNaturally weave in some of these phrases where they fit:\n${hints.map(p=>`  "${p.vi}" (${p.en})`).join('\n')}`:'';

  const prompt=`You are a Spanish language tutor creating a learning dialogue.

Topic/scene: "${topic}"
Total exchanges: ${lenMap[AI.length]||'8 to 10'} (split between speaker A and B)
Level: conversational Spanish for beginner-intermediate learners${vocabStr}

Return ONLY valid JSON (no markdown, no extra text):
{
  "title": "short catchy title",
  "scene": "one sentence setting the scene",
  "exchanges": [
    {
      "speaker": "A",
      "vi": "Full Spanish sentence",
      "en": "Full English translation",
      "words": [
        {"vi": "word or short phrase", "en": "English meaning"}
      ]
    }
  ]
}

Important rules for the "words" array:
- Every word must appear — words should reconstruct the full Spanish sentence
- Keep common phrases together: "me llamo", "por favor", "muchas gracias", "¿cómo estás?", etc.
- Include question marks (¿), exclamation marks (¡) with their adjacent words
- Short but complete — each entry gives the learner a clear, useful gloss
- Use natural, conversational Spanish at beginner-intermediate level`;

  AI.loading=true; AI.result=null;
  renderAIForm();

  try{
    const res=await fetch(GEMINI_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{parts:[{text:prompt}]}],
        generationConfig:{temperature:0.85,maxOutputTokens:2500,responseMimeType:'application/json'}
      })
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));
    let raw=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    raw=raw.replace(/^```json?\s*/,'').replace(/\s*```$/,'').trim();
    AI.result=JSON.parse(raw);
    AI.loading=false;
    renderAIForm();
  }catch(err){
    AI.loading=false;
    renderAIForm();
    const out=document.getElementById('ai-output');
    if(out) out.innerHTML=`<div class="type-result bad" style="margin-top:24px">
      <strong>⚠️ Generation failed:</strong> ${err.message}<br><br>
      <strong>Quick fixes:</strong><br>
      • Go to <a href="https://console.cloud.google.com/apis/library/generativelanguage.googleapis.com" target="_blank">Google Cloud Console</a> and enable the <em>Generative Language API</em><br>
      • Make sure the API key has "Generative Language API" access<br>
      • Check browser console for details
    </div>`;
  }
}
